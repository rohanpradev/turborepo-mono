name: CI

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    name: Lint, Typecheck, Test, Build
    timeout-minutes: 25
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node.js environment
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate Docker Compose files
        run: |
          docker compose --env-file .env.example config > /tmp/compose.rendered.yml
          docker compose -f packages/kafka/compose.yml config > /tmp/kafka.compose.rendered.yml

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run check-types

      - name: Audit
        run: bun run audit

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
